services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dietary-tracking-backend:latest
    container_name: dietary-tracking-backend
    networks:
      - dietary-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dietary-tracking-frontend:latest
    container_name: dietary-tracking-frontend
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - dietary-net
    restart: unless-stopped

networks:
  dietary-net:
    driver: bridge
