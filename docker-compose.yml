version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dietary-tracking-backend:latest
    container_name: dietary-tracking-backend
    ports:
      - "8080:8080"
    networks:
      - dietary-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: dietary-tracking-frontend:latest
    container_name: dietary-tracking-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - dietary-net
    restart: unless-stopped

networks:
  dietary-net:
    driver: bridge
